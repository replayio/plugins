name: Publish plugin release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to upload assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build and validate plugins
        run: npm run check

      - name: Package plugin bundles
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          plugins=(
            "codex:dist/codex/replayio:replayio-codex-plugin.zip"
            "cursor:dist/cursor/replayio:replayio-cursor-plugin.zip"
            "opencode:dist/opencode/replayio:replayio-opencode-plugin.zip"
            "claude-code:dist/claude-code/replayio:replayio-claude-code-plugin.zip"
          )

          for plugin in "${plugins[@]}"; do
            IFS=: read -r target bundle_dir asset_name <<< "$plugin"
            asset_path="release-assets/$asset_name"

            if [ ! -d "$bundle_dir" ]; then
              echo "Missing $target plugin bundle at $bundle_dir" >&2
              exit 1
            fi

            (cd "$bundle_dir" && zip -qr "$GITHUB_WORKSPACE/$asset_path" .)
            unzip -t "$asset_path"
          done

          ls -lh release-assets/*.zip

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            tag_name="${{ github.event.release.tag_name }}"
          else
            tag_name="${{ inputs.tag_name }}"
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" release-assets/*.zip --clobber
